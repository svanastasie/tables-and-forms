<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Форма выбора питомца</title>
    <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<main>
    <h1>Найди себе друга!</h1>

    <form action="/pets/orders" method="POST">
        <label>
            Выберите тип питомца:
            <select name="petType">
                <option value="cat">Кошка</option>
                <option value="dog">Собака</option>
                <option value="rodent">Грызун</option>
                <option value="bird">Птица</option>
                <option value="reptile">Рептилия</option>
            </select>
        </label>

        <label>
            <input type="radio" name="gender" value="boy"/>
            Мужской пол
        </label>
        <label>
            <input type="radio" name="gender" value="girl"/>
            Женский пол
        </label>
        <label>
            <input type="radio" name="gender" value="none"/>
            Не определен
        </label>

        <lable>
            Цвет глаз:
            <input type="color" name="eyeColor"/>
        </lable>

        <label>
            Длина хвоста:
            <input type="number" name="tailLength" min="7" max="120" placeholder="7"/>
        </label>

        <label>
            Введите имя питомца:
            <input type="text" name="name" required placeholder="Имя"/>
        </label>

        <label>
            Дата рождения:
            <input type="date" name="dateOfBirth"/>
        </label>

        <label>
            Ваш email:
            <input type="email" name="email" required placeholder="123@mail.ru"/>
        </label>

        <label>
            Ваш телефон:
            <input type="tel" name="phone" placeholder="+7123456789"/>
        </label>

        <label>
            <input type="checkbox" name="rules" value="true" required>Я согласен с правилами
        </label>

        <button type="reset">Сбросить все</button>
        <button type="submit">Отправить</button>
    </form>
</main>
</body>
</html>
